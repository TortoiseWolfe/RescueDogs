    <rect x="30" y="244" width="300" height="20" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="38" y="258" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Full name *</text>
    <rect x="30" y="268" width="300" height="20" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="38" y="282" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Phone</text>
    <rect x="30" y="292" width="96" height="20" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="36" y="306" font-family="system-ui, sans-serif" font-size="14" fill="#374151">City</text>
    <rect x="132" y="292" width="96" height="20" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="138" y="306" font-family="system-ui, sans-serif" font-size="14" fill="#374151">State</text>
    <rect x="234" y="292" width="96" height="20" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="240" y="306" font-family="system-ui, sans-serif" font-size="14" fill="#374151">ZIP</text>

    <!-- Section 3: Your Home -->
    <rect x="20" y="326" width="320" height="118" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="30" y="344" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Your Home</text>
    <rect x="30" y="352" width="300" height="22" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="38" y="367" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Rent — apartment ▾</text>
    <rect x="30" y="378" width="300" height="36" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="38" y="386" width="14" height="14" rx="3" fill="#22c55e" stroke="#b8a080"/>
    <text x="58" y="398" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Landlord approved</text>
    <rect x="38" y="420" width="14" height="14" rx="3" fill="#22c55e" stroke="#b8a080"/>
    <text x="58" y="432" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Yard / fenced</text>

    <!-- Section 4 + 5 condensed -->
    <rect x="20" y="452" width="320" height="40" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="30" y="470" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Household &amp; Pets</text>
    <text x="30" y="486" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">References &amp; Experience</text>

    <!-- Submit -->
    <rect x="20" y="500" width="320" height="30" rx="6" fill="#8b5cf6"/>
    <text x="180" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f5f0e6" font-weight="bold">Submit application</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>

    <!-- Mobile callouts -->
    <g class="callout"><circle cx="320" cy="190" r="11" fill="#dc2626"/><text x="320" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="40" cy="393" r="11" fill="#dc2626"/><text x="40" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="40" cy="427" r="11" fill="#dc2626"/><text x="40" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="335" cy="515" r="11" fill="#dc2626"/><text x="335" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">4</text></g>
  </g>

  <!-- ===================== ANNOTATIONS ===================== -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <g class="callout"><circle cx="34" cy="34" r="14" fill="#dc2626"/><text x="34" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text></g>
    <text x="62" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Pet select (required)</text>
    <a href="#us-001"><rect x="62" y="44" width="64" height="22" rx="4" fill="#8b5cf6"/><text x="94" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f5f0e6" font-weight="700">US-001</text></a>
    <text x="20" y="92" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Section "This Pet" — required &lt;select&gt; listing</text>
    <text x="20" y="112" font-family="system-ui, sans-serif" font-size="14" fill="#374151">rescues, e.g. "Biscuit — Labrador Mix".</text>

    <g class="callout"><circle cx="494" cy="34" r="14" fill="#dc2626"/><text x="494" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">2</text></g>
    <text x="522" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Conditional renting block</text>
    <a href="#us-002"><rect x="522" y="44" width="64" height="22" rx="4" fill="#8b5cf6"/><text x="554" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f5f0e6" font-weight="700">US-002</text></a>
    <text x="480" y="92" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Shaded sub-block shown only when renting.</text>
    <text x="480" y="112" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"Landlord approved" + "Landlord contact".</text>

    <g class="callout"><circle cx="954" cy="34" r="14" fill="#dc2626"/><text x="954" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text></g>
    <text x="982" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Conditional yard-fenced</text>
    <a href="#us-003"><rect x="982" y="44" width="64" height="22" rx="4" fill="#8b5cf6"/><text x="1014" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f5f0e6" font-weight="700">US-003</text></a>
    <text x="940" y="92" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"I have a yard" reveals nested checkbox</text>
    <text x="940" y="112" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"The yard is fenced" only when checked.</text>

    <g class="callout"><circle cx="1414" cy="34" r="14" fill="#dc2626"/><text x="1414" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">4</text></g>
    <text x="1442" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Submit application</text>
    <a href="#us-004"><rect x="1442" y="44" width="64" height="22" rx="4" fill="#8b5cf6"/><text x="1474" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f5f0e6" font-weight="700">US-004</text></a>
    <text x="1400" y="92" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Full-width primary button; disabled +</text>
    <text x="1400" y="112" font-family="system-ui, sans-serif" font-size="14" fill="#374151">spinner while submitting, then status.</text>
  </g>

  <text x="40" y="1060" font-family="system-ui, sans-serif" font-size="18" fill="#374151" font-weight="bold">048:01 | Apply To Adopt (as-is /adopt) | ScriptHammer</text>
</svg>
