<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7ddf5"/>
      <stop offset="1" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#4b5563">APPLY TO ADOPT - /adopt (AS-IS)</text>
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#d946ef" font-weight="bold">MOBILE</text>

  <!-- ===================== DESKTOP ===================== -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Page header (max-w-3xl centered) -->
    <text x="340" y="92" font-family="system-ui, sans-serif" font-size="22" fill="#1f2937" font-weight="bold">Apply to Adopt</text>
    <text x="340" y="116" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">One application, every answer saved for next time — and you can watch its</text>
    <text x="340" y="134" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">status live from the moment you submit.</text>

    <!-- centered form column max-w-3xl : x 340..940 (width 600) -->

    <!-- Section 1: This Pet -->
    <rect x="340" y="150" width="600" height="76" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <rect x="356" y="142" width="86" height="20" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
    <text x="364" y="156" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">This Pet</text>
    <text x="356" y="184" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Pet</text>
    <text x="375" y="184" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">*</text>
    <rect x="356" y="192" width="568" height="26" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="366" y="209" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Biscuit — Labrador Mix</text>
    <text x="908" y="209" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">▾</text>

    <!-- Section 2: About You -->
    <rect x="340" y="238" width="600" height="186" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <rect x="356" y="230" width="98" height="20" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
    <text x="364" y="244" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">About You</text>
    <text x="356" y="270" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Full name *</text>
    <rect x="356" y="276" width="568" height="24" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="366" y="292" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Jane Doe</text>
    <text x="356" y="318" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Phone</text>
    <rect x="356" y="324" width="568" height="24" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="366" y="340" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">555-555-0123</text>
    <text x="356" y="366" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Street address</text>
    <rect x="356" y="372" width="568" height="24" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <!-- 3-col City / State / ZIP -->
    <rect x="356" y="402" width="180" height="18" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="362" y="415" font-family="system-ui, sans-serif" font-size="14" fill="#374151">City</text>
