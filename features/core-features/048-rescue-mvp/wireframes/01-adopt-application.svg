    <text x="556" y="415" font-family="system-ui, sans-serif" font-size="14" fill="#374151">State</text>
    <rect x="744" y="402" width="180" height="18" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="750" y="415" font-family="system-ui, sans-serif" font-size="14" fill="#374151">ZIP</text>

    <!-- Section 3: Your Home (with conditional blocks) -->
    <rect x="340" y="436" width="600" height="150" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <rect x="356" y="428" width="98" height="20" rx="4" fill="#e8d4b8" stroke="#b8a080"/>
    <text x="364" y="442" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Your Home</text>
    <text x="356" y="464" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Housing situation *</text>
    <rect x="356" y="470" width="568" height="22" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="366" y="485" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Rent — apartment</text>
    <text x="908" y="485" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">▾</text>
