    <!-- Page header -->
    <text x="20" y="108" font-family="system-ui, sans-serif" font-size="16" fill="#1f2937" font-weight="bold">Apply to Adopt</text>
    <text x="20" y="126" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">One application, saved for</text>
    <text x="20" y="142" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">next time. Watch it live.</text>

    <!-- Section 1: This Pet -->
    <rect x="20" y="152" width="320" height="58" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="30" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">This Pet</text>
    <rect x="30" y="178" width="300" height="24" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="38" y="194" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Biscuit — Labrador Mix ▾</text>

    <!-- Section 2: About You -->
    <rect x="20" y="218" width="320" height="100" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
