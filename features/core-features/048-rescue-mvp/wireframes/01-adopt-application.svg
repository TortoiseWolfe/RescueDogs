    <rect x="356" y="498" width="568" height="44" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="372" y="505" width="16" height="16" rx="3" fill="#22c55e" stroke="#b8a080"/>
    <text x="396" y="518" font-family="system-ui, sans-serif" font-size="14" fill="#374151">My landlord has approved a pet</text>
    <text x="372" y="537" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Landlord contact</text>
    <rect x="500" y="527" width="412" height="14" rx="3" fill="#f5f0e6" stroke="#b8a080"/>
    <!-- has yard + conditional fenced -->
    <rect x="356" y="548" width="16" height="16" rx="3" fill="#22c55e" stroke="#b8a080"/>
    <text x="382" y="561" font-family="system-ui, sans-serif" font-size="14" fill="#374151">I have a yard</text>
    <rect x="500" y="548" width="16" height="16" rx="3" fill="#22c55e" stroke="#b8a080"/>
    <text x="526" y="561" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The yard is fenced</text>

    <!-- Section 4 + 5 condensed + Submit -->
    <rect x="340" y="594" width="370" height="14" rx="3" fill="#e8d4b8" stroke="#b8a080"/>
    <text x="346" y="605" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937" font-weight="bold">Household &amp; Pets / References &amp; Experience</text>
    <rect x="730" y="592" width="210" height="18" rx="4" fill="#8b5cf6"/>
    <text x="835" y="605" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f5f0e6" font-weight="bold">Submit application</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <!-- Callouts -->
    <g class="callout"><circle cx="912" cy="205" r="14" fill="#dc2626"/><text x="912" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="372" cy="513" r="14" fill="#dc2626"/><text x="372" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="500" cy="556" r="14" fill="#dc2626"/><text x="500" y="561" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="730" cy="580" r="14" fill="#dc2626"/><text x="730" y="585" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">4</text></g>
  </g>

  <!-- ===================== MOBILE ===================== -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
