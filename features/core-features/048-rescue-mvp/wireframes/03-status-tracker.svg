<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">STATUS TRACKER - /applications/status (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <!-- ============================== DESKTOP ============================== -->
  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- centered max-w-3xl content column -->
    <!-- back link -->
    <text x="330" y="118" font-family="system-ui, sans-serif" font-size="15" fill="#2563eb">&#8592; All my applications</text>

    <!-- header row: title block (left) + StatusBadge (right) -->
    <text x="330" y="158" font-family="system-ui, sans-serif" font-size="26" font-weight="bold" fill="#1f2937">Application for Biscuit</text>
    <text x="330" y="184" font-family="system-ui, sans-serif" font-size="15" fill="#6b7280">Labrador Mix</text>
    <!-- StatusBadge (badge-accent = Home Visit) -->
    <rect x="820" y="138" width="130" height="32" rx="16" fill="#8b5cf6"/>
    <text x="885" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">Home Visit</text>

    <!-- ======== TIMELINE: 5-step horizontal "steps" component ======== -->
    <rect x="330" y="210" width="620" height="120" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
    <!-- connector line behind the step nodes -->
    <rect x="378" y="252" width="524" height="4" fill="#dcc8a8"/>
    <!-- filled portion of connector (up to current = Home Visit, step 4) -->
    <rect x="378" y="252" width="393" height="4" fill="#8b5cf6"/>

    <!-- Step 1: Submitted (filled/primary) -->
    <circle cx="378" cy="254" r="16" fill="#8b5cf6"/>
    <text x="378" y="259" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">1</text>
    <text x="378" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Submitted</text>
    <!-- Step 2: Under Review (filled/primary) -->
    <circle cx="509" cy="254" r="16" fill="#8b5cf6"/>
    <text x="509" y="259" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">2</text>
    <text x="509" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Under Review</text>
    <!-- Step 3: Reference Check (filled/primary) -->
    <circle cx="640" cy="254" r="16" fill="#8b5cf6"/>
    <text x="640" y="259" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">3</text>
    <text x="640" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Reference Check</text>
    <!-- Step 4: Home Visit (CURRENT — emphasized) -->
    <circle cx="771" cy="254" r="21" fill="#8b5cf6" stroke="#22c55e" stroke-width="4"/>
    <text x="771" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">4</text>
    <text x="771" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Home Visit</text>
    <!-- Step 5: Approved (muted / not yet reached) -->
    <circle cx="902" cy="254" r="16" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="902" y="259" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b7280">5</text>
    <text x="902" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Approved</text>

    <!-- ======== UPDATES list ======== -->
    <text x="330" y="368" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b7280" letter-spacing="1">UPDATES</text>

    <!-- entry 1: badge + date -->
    <rect x="330" y="380" width="104" height="26" rx="13" fill="#8b5cf6"/>
    <text x="382" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">Home Visit</text>
    <text x="448" y="398" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Jun 12, 2026</text>
    <!-- shelter NOTE chat bubble -->
    <rect x="330" y="414" width="500" height="46" rx="10" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="346" y="442" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Home visit scheduled for next Tuesday &#8212; we can't wait to meet you!</text>

    <!-- entry 2: badge + date -->
    <rect x="330" y="472" width="138" height="26" rx="13" fill="#8b5cf6"/>
    <text x="399" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">Reference Check</text>
    <text x="482" y="490" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Jun 9, 2026</text>

    <!-- entry 3: badge + date -->
    <rect x="330" y="506" width="122" height="26" rx="13" fill="#8b5cf6"/>
    <text x="391" y="524" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">Under Review</text>
    <text x="466" y="524" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Jun 7, 2026</text>

    <!-- ======== WITHDRAW (ghost button, non-terminal only) ======== -->
    <line x1="330" y1="552" x2="950" y2="552" stroke="#b8a080" stroke-width="1"/>
    <rect x="330" y="566" width="190" height="34" rx="6" fill="#e8d4b8" stroke="#b8a080" stroke-dasharray="4 3"/>
    <text x="425" y="588" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">Withdraw application</text>

    <!-- callouts -->
    <g class="callout"><circle cx="950" cy="254" r="14" fill="#dc2626"/><text x="950" y="259" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="771" cy="212" r="14" fill="#dc2626"/><text x="771" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="846" cy="437" r="14" fill="#dc2626"/><text x="846" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="536" cy="583" r="14" fill="#dc2626"/><text x="536" y="588" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">4</text></g>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>

  <!-- ============================== MOBILE ============================== -->
  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <!-- back link -->
    <text x="20" y="108" font-family="system-ui, sans-serif" font-size="14" fill="#2563eb">&#8592; All my applications</text>

    <!-- header: title + badge stacked -->
    <text x="20" y="138" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Application for Biscuit</text>
    <text x="20" y="158" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Labrador Mix</text>
    <rect x="20" y="170" width="110" height="26" rx="13" fill="#8b5cf6"/>
    <text x="75" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">Home Visit</text>

    <!-- VERTICAL 5-step timeline (steps-vertical on mobile) -->
    <rect x="20" y="208" width="320" height="248" rx="8" fill="#f5f0e6" stroke="#b8a080"/>
    <!-- vertical connector -->
    <rect x="46" y="236" width="4" height="168" fill="#dcc8a8"/>
    <rect x="46" y="236" width="4" height="126" fill="#8b5cf6"/>

    <circle cx="48" cy="236" r="13" fill="#8b5cf6"/>
    <text x="48" y="241" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">1</text>
    <text x="72" y="241" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Submitted</text>

    <circle cx="48" cy="278" r="13" fill="#8b5cf6"/>
    <text x="48" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">2</text>
    <text x="72" y="283" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Under Review</text>

    <circle cx="48" cy="320" r="13" fill="#8b5cf6"/>
    <text x="48" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">3</text>
    <text x="72" y="325" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Reference Check</text>

    <circle cx="48" cy="362" r="17" fill="#8b5cf6" stroke="#22c55e" stroke-width="3"/>
    <text x="48" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">4</text>
    <text x="72" y="367" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Home Visit</text>

    <circle cx="48" cy="404" r="13" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="48" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b7280">5</text>
    <text x="72" y="409" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Approved</text>

    <!-- UPDATES -->
    <text x="20" y="486" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b7280" letter-spacing="1">UPDATES</text>
    <rect x="20" y="494" width="104" height="26" rx="13" fill="#8b5cf6"/>
    <text x="72" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">Home Visit</text>
    <text x="134" y="512" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Jun 12</text>
    <!-- note chat bubble -->
    <rect x="20" y="526" width="320" height="58" rx="10" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="34" y="548" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Home visit scheduled for next</text>
    <text x="34" y="568" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Tuesday &#8212; can't wait to meet you!</text>

    <!-- withdraw ghost button -->
    <rect x="20" y="598" width="180" height="32" rx="6" fill="#e8d4b8" stroke="#b8a080" stroke-dasharray="4 3"/>
    <text x="110" y="619" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">Withdraw application</text>

    <!-- mobile callouts (r=11) -->
    <g class="callout"><circle cx="320" cy="404" r="11" fill="#dc2626"/><text x="320" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="320" cy="555" r="11" fill="#dc2626"/><text x="320" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text></g>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- ============================== ANNOTATIONS ============================== -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <g transform="translate(20, 30)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text>
      <text x="40" y="12" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">5-step pipeline timeline</text>
      <a href="#us-001" transform="translate(280, -2)"><rect width="60" height="20" rx="4" fill="#0891b2"/><text x="30" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">US-001</text></a>
      <text x="40" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#374151">DaisyUI steps: Submitted &#8594; Under Review &#8594;</text>
      <text x="40" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Reference Check &#8594; Home Visit &#8594; Approved.</text>
      <text x="40" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Realtime-subscribed (loop stage 3).</text>
    </g>

    <g transform="translate(480, 30)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">2</text>
      <text x="40" y="12" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Current-stage highlight</text>
      <a href="#us-001" transform="translate(280, -2)"><rect width="60" height="20" rx="4" fill="#0891b2"/><text x="30" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">US-001</text></a>
      <text x="40" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Steps up to &amp; incl. the current stage</text>
      <text x="40" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#374151">(Home Visit) are filled/primary &amp;</text>
      <text x="40" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#374151">emphasized; Approved stays muted/grey.</text>
    </g>

    <g transform="translate(940, 30)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text>
      <text x="40" y="12" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Shelter note chat bubble</text>
      <a href="#us-002" transform="translate(290, -2)"><rect width="60" height="20" rx="4" fill="#0891b2"/><text x="30" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">US-002</text></a>
      <text x="40" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#374151">UPDATES entries pair a status badge +</text>
      <text x="40" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#374151">date; adopter-visible notes render as a</text>
      <text x="40" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#374151">chat-start info bubble.</text>
    </g>

    <g transform="translate(1400, 30)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">4</text>
      <text x="40" y="12" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Withdraw button</text>
      <a href="#us-003" transform="translate(220, -2)"><rect width="60" height="20" rx="4" fill="#0891b2"/><text x="30" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f5f0e6">US-003</text></a>
      <text x="40" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Subtle ghost button, shown only for non-</text>
      <text x="40" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#374151">terminal statuses. Click &#8594; confirm alert</text>
      <text x="40" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"Yes, withdraw" / "Keep my application".</text>
    </g>
  </g>

  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">048:03 | Status Tracker (as-is /applications/status) | ScriptHammer</text>
</svg>
