  <!-- ============ ANNOTATIONS ============ -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <!-- Column 1 -->
    <circle cx="34" cy="40" r="14" fill="#dc2626"/>
    <text x="34" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text>
    <text x="62" y="38" fill="#1f2937" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Status filter tabs (counts)</text>
    <text x="62" y="60" fill="#374151" font-family="system-ui, sans-serif" font-size="14">Bordered, scrollable tabs per status,</text>
    <text x="62" y="78" fill="#374151" font-family="system-ui, sans-serif" font-size="14">each with a live count. "All (3)" is the</text>
    <text x="62" y="96" fill="#374151" font-family="system-ui, sans-serif" font-size="14">active tab. Only statuses in data appear.</text>
    <a href="#us-001"><rect x="62" y="110" width="78" height="24" rx="4" fill="#0891b2"/><text x="101" y="127" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">US-001</text></a>

    <!-- Column 2 -->
    <circle cx="494" cy="40" r="14" fill="#dc2626"/>
    <text x="494" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">2</text>
    <text x="522" y="38" fill="#1f2937" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Status badge in a row</text>
    <text x="522" y="60" fill="#374151" font-family="system-ui, sans-serif" font-size="14">StatusBadge maps each pipeline stage to</text>
    <text x="522" y="78" fill="#374151" font-family="system-ui, sans-serif" font-size="14">a DaisyUI color: Under Review = primary,</text>
    <text x="522" y="96" fill="#374151" font-family="system-ui, sans-serif" font-size="14">Home Visit = accent, Submitted = info.</text>
    <a href="#us-002"><rect x="522" y="110" width="78" height="24" rx="4" fill="#0891b2"/><text x="561" y="127" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">US-002</text></a>

    <!-- Column 3 -->
    <circle cx="954" cy="40" r="14" fill="#dc2626"/>
    <text x="954" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">3</text>
    <text x="982" y="38" fill="#1f2937" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Per-row "Review" button</text>
    <text x="982" y="60" fill="#374151" font-family="system-ui, sans-serif" font-size="14">Right-aligned ghost button links to the</text>
    <text x="982" y="78" fill="#374151" font-family="system-ui, sans-serif" font-size="14">detail page (/shelter/application?id=…)</text>
    <text x="982" y="96" fill="#374151" font-family="system-ui, sans-serif" font-size="14">to advance the application (loop stage 2).</text>
    <a href="#us-003"><rect x="982" y="110" width="78" height="24" rx="4" fill="#0891b2"/><text x="1021" y="127" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">US-003</text></a>

    <!-- Column 4 -->
    <circle cx="1414" cy="40" r="14" fill="#dc2626"/>
    <text x="1414" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#fff" font-weight="bold">4</text>
    <text x="1442" y="38" fill="#1f2937" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Shelter-name header (ShelterGate)</text>
    <text x="1442" y="60" fill="#374151" font-family="system-ui, sans-serif" font-size="14">Staff-only gate renders the shelter name</text>
    <text x="1442" y="78" fill="#374151" font-family="system-ui, sans-serif" font-size="14">("Happy Tails Rescue") + the subtitle</text>
    <text x="1442" y="96" fill="#374151" font-family="system-ui, sans-serif" font-size="14">"signed in as shelter staff".</text>
    <a href="#us-001"><rect x="1442" y="110" width="78" height="24" rx="4" fill="#0891b2"/><text x="1481" y="127" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">US-001</text></a>
